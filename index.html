<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Trajectory - USAF PFA readiness tracking and projection tool for Air Force personnel" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Trajectory" />
    <link rel="icon" type="image/svg+xml" href="/Trajectory/icons/icon.svg" />
    <title>Trajectory - USAF PFA Tracker</title>
    <script>
      // Handle redirect from 404.html for SPA routing on GitHub Pages
      (function() {
        const redirect = new URLSearchParams(window.location.search).get('redirect');
        if (redirect) {
          // Remove the redirect parameter and update the URL
          const newUrl = window.location.pathname.replace(/\/$/, '') + redirect;
          window.history.replaceState(null, null, newUrl);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
