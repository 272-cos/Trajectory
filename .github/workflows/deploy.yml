name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Check upstream USAF publications for drift
        id: upstream_check
        run: |
          bash scripts/check-upstream-pubs.sh || {
            EXIT=$?
            if [ "$EXIT" -eq 2 ]; then
              echo "::warning::Upstream USAF publications unreachable from CI (WAF/network block). Drift check skipped. Run locally to verify: bash scripts/check-upstream-pubs.sh"
              exit 0
            fi
            exit $EXIT
          }

      - name: Upload upstream drift snapshots (on failure)
        if: failure() && steps.upstream_check.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: upstream-drift-snapshots
          path: docs/upstream-snapshots/
          retention-days: 30
          if-no-files-found: ignore

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
